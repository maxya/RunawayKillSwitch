name: CI

on:
  workflow_dispatch:

jobs:
  test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: proxy-engine/go.sum

      - name: Download dependencies
        run: cd proxy-engine && go mod download

      - name: go vet
        run: cd proxy-engine && go vet ./...

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: golangci-lint
        run: cd proxy-engine && golangci-lint run ./...

      - name: Run unit tests
        run: cd proxy-engine && go test -race ./... -v

      - name: Run integration tests
        run: cd proxy-engine && go test -tags integration -race ./core/... -v -timeout 120s
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Scan for vulnerable dependencies
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "proxy-engine"
          scanners: "vuln"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  docker-build:
    name: Docker Build
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker compose build
